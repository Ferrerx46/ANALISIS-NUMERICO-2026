<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Numérica</title>
    <link rel="stylesheet" href="styles.css">

    <!-- GeoGebra -->
    <script src="https://www.geogebra.org/apps/deployggb.js"></script>
</head>
<body>

    <div class="container">

        <!-- PANEL IZQUIERDO -->
        <div class="sidebar">
            <h2>Unidades</h2>
            <select id="unidadSeleccionada" onchange="cambiarUnidad()">
                <option value="raices">Unidad 1: Raíces</option>
                <option value="sistemas">Unidad 2: Sistemas (Matrices)</option>
            </select>

            <hr>

            <div id="form-raices">
                <label>Método</label>
                <select id="metodo">
                    <option value="Biseccion">Bisección</option>
                    <option value="ReglaFalsa">Regla Falsa</option>
                    <option value="Secante">Secante</option>
                    <option value="Tangente">Tangente</option>
                </select>
                <label>Función</label>
                <input type="text" id="funcion" placeholder="x*x - 4">
                <label>Xi / Xd</label>
                <div style="display:flex; gap:5px">
                    <input type="number" id="xi" value="-5" style="width:50%">
                    <input type="number" id="xd" value="5" style="width:50%">
                </div>
            </div>

            <div id="form-sistemas" style="display:none;">
                <label>Método</label>
                <select id="metodoMatriz">
                    <option value="GaussJordan">Gauss-Jordan</option>
                    <option value="GaussSeidel">Gauss-Seidel</option>
                </select>
                <label>Dimensión (N)</label>
                <input type="number" id="nMatriz" value="3" min="2" max="6" onchange="crearGrillaMatriz()">

                <div id="contenedor-matriz" class="matrix-container">
                </div>
            </div>

            <button onclick="calcular()" style="margin-top:20px;">Calcular</button>
        </div>

        <!-- CONTENIDO -->
        <div class="main">

            <h1>UNIDAD 1 – RAÍCES DE FUNCIONES</h1>

            <div class="content">

                <!-- RESULTADOS -->
                <div class="card">
                    <h3 id="tituloMetodo">Método</h3>
                    <p class="funcion" id="fx">f(x)</p>

                    <div class="dato">
                        <span>Iteraciones</span>
                        <span id="it">0</span>
                    </div>

                    <div class="dato">
                        <span>Error</span>
                        <span id="error">0</span>
                    </div>

                    <div class="dato">
                        <span>Raíz</span>
                        <span id="raiz">0</span>
                    </div>

                    <div class="dato">
                        <span>Converge</span>
                        <span id="conv">-</span>
                    </div>
                </div>

                <!-- GRAFICO -->
                <div class="grafico">
                    <div id="ggb-element"></div>
                </div>

            </div>

        </div>

    </div>

    <script>
        let app;

        // 1. Inicialización
        window.onload = () => {
            app = new GGBApplet({
                appName: "graphing",
                width: 600,
                height: 400,
                showToolBar: false,
                showAlgebraInput: false,
                showMenuBar: false
            }, true);
            app.inject('ggb-element');

            // Generar una matriz inicial de 3x3 por defecto
            crearGrillaMatriz();
        };

        // 2. Lógica de UI (Cambio de Unidad y Grilla)
        function cambiarUnidad() {
            const unidad = document.getElementById("unidadSeleccionada").value;
            document.getElementById("form-raices").style.display = unidad === "raices" ? "block" : "none";
            document.getElementById("form-sistemas").style.display = unidad === "sistemas" ? "block" : "none";
            document.querySelector(".grafico").style.display = unidad === "raices" ? "block" : "none";

            if (unidad === "sistemas") crearGrillaMatriz();
        }

        function crearGrillaMatriz() {
            const n = parseInt(document.getElementById("nMatriz").value);
            const contenedor = document.getElementById("contenedor-matriz");
            contenedor.style.gridTemplateColumns = `repeat(${n + 1}, 1fr)`;
            contenedor.innerHTML = "";

            for (let i = 0; i < n; i++) {
                for (let j = 0; j <= n; j++) {
                    const input = document.createElement("input");
                    input.type = "number";
                    input.className = "matrix-input" + (j === n ? " col-indep" : "");
                    input.id = `m_${i}_${j}`;
                    input.value = "0";
                    contenedor.appendChild(input);
                }
            }
        }

        // 3. Enviar datos a C#
        function calcular() {
            const unidad = document.getElementById("unidadSeleccionada").value;

            const getNum = (id) => {
                let val = document.getElementById(id).value.toString().replace(",", ".");
                return parseFloat(val);
            };

            if (unidad === "raices") {
                const data = {
                    tipoAccion: "RAICES",
                    funcion: document.getElementById("funcion").value,
                    xi: getNum("xi"),
                    xd: getNum("xd"),
                    iteraciones: parseInt(document.getElementById("iteraciones").value),
                    tolerancia: getNum("tolerancia"),
                    metodo: document.getElementById("metodo").value
                };
                window.chrome.webview.postMessage(data);
            } else {
                const n = parseInt(document.getElementById("nMatriz").value);
                let matriz = [];
                for (let i = 0; i < n; i++) {
                    let fila = [];
                    for (let j = 0; j <= n; j++) {
                        fila.push(parseFloat(document.getElementById(`m_${i}_${j}`).value));
                    }
                    matriz.push(fila);
                }
                const data = {
                    tipoAccion: "SISTEMA",
                    metodo: document.getElementById("metodoMatriz").value,
                    dimension: n,
                    matriz: matriz
                };
                window.chrome.webview.postMessage(data);
            }
        }

        // 4. Recibir desde C# (Unificado)
        window.chrome.webview.addEventListener('message', event => {
            const d = event.data;

            // Caso A: Es un resultado de SISTEMAS (Matriz)
            if (d.Soluciones || d.soluciones) {
                const sols = d.Soluciones || d.soluciones;
                document.getElementById("tituloMetodo").innerText = d.Metodo || d.metodo;
                document.getElementById("fx").innerText = "Sistema de Ecuaciones";
                document.getElementById("it").innerText = d.Iteraciones || d.iteraciones;
                document.getElementById("error").innerText = (d.Error || d.error).toFixed(6);
                document.getElementById("conv").innerText = (d.Converge || d.converge) ? "Sí" : "No";

                // Formatear resultados: X1: 2.00 | X2: 5.00 ...
                let resText = sols.map((val, idx) => `X${idx + 1}: ${val.toFixed(4)}`).join(" | ");
                document.getElementById("raiz").innerText = resText;
            }
            // Caso B: Es un resultado de RAÍCES
            else {
                document.getElementById("fx").innerText = d.funcion;
                document.getElementById("it").innerText = d.iteraciones;
                document.getElementById("error").innerText = d.error;
                document.getElementById("raiz").innerText = d.raiz;
                document.getElementById("conv").innerText = d.converge ? "Sí" : "No";

                if (!d.converge && d.mensaje) {
                    document.getElementById("tituloMetodo").innerText = d.metodo + " ⚠️ (" + d.mensaje + ")";
                } else {
                    document.getElementById("tituloMetodo").innerText = d.metodo;
                }
                graficar(d.funcion, d.raiz, d.xi, d.xd, d.metodo);
            }
        });

        // 5. GeoGebra Helpers
        function graficar(funcion, raiz, xi, xd, metodo) {
            let ggb = app.getAppletObject();
            ggb.reset();
            let fx = funcion.replace(/,/g, ".");
            ggb.evalCommand(`f(x) = ${fx}`);
            ggb.evalCommand(`y = 0`);

            if (raiz !== null && !isNaN(raiz)) {
                ggb.evalCommand(`A = (${raiz}, 0)`);
                ggb.setPointStyle("A", 1);
            }
            ggb.evalCommand(`B = (${xi}, 0)`);
            ggb.evalCommand(`C = (${xd}, 0)`);
            ggb.evalCommand(`Segment(B, C)`);

            if (metodo === "Secante") {
                ggb.evalCommand(`Line(( ${xi}, f(${xi}) ), ( ${xd}, f(${xd}) ))`);
            }
            if (metodo === "Tangente" && !isNaN(raiz)) {
                ggb.evalCommand(`T = Tangent( (${raiz}, f(${raiz}) ), f)`);
            }
        }
    </script>

</body>
</html>
