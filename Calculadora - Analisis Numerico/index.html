<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Numérica</title>
    <script src="https://www.geogebra.org/apps/deployggb.js"></script>
    <style>
        /* Diseño General */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            display: flex;
            height: 100vh;
            color: #333;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Sidebar (Menú) */
        .sidebar {
            width: 300px;
            background: #fff;
            padding: 20px;
            border-right: 1px solid #dee2e6;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            overflow-y: auto;
        }

        h2, h3 {
            color: #1d3557;
            margin-top: 0;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ced4da;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #457b9d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

            button:hover {
                background-color: #1d3557;
            }

        .btn-danger {
            background-color: #e63946;
            margin-top: 5px;
        }

            .btn-danger:hover {
                background-color: #b92a36;
            }

        /* Main (Contenido) */
        .main {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        /* Componentes */
        .matrix-container {
            display: grid;
            gap: 5px;
            margin-top: 10px;
        }

        .matrix-input {
            text-align: center;
            font-weight: bold;
        }

        .col-indep {
            background-color: #f1faee;
            border: 1px solid #a8dadc;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .dato {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

            .dato span:last-child {
                font-weight: bold;
            }

        .tabla-resumen {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

            .tabla-resumen th, .tabla-resumen td {
                border: 1px solid #dee2e6;
                padding: 10px;
                text-align: center;
            }

            .tabla-resumen th {
                background-color: #f8f9fa;
            }

        .grafico {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #ggb-element {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <h2>Unidades</h2>
            <select id="unidadSeleccionada" onchange="cambiarUnidad()">
                <option value="raices">Unidad 1: Raíces</option>
                <option value="sistemas">Unidad 2: Sistemas (Matrices)</option>
                <option value="regresiones">Unidad 3: Regresiones</option>
                <option value="integracion">Unidad 4: Integración Numérica</option>
            </select>

            <hr>

            <div id="panelConfiguracion">
                <label>Configuración</label>
                <div style="display:flex; gap:5px">
                    <input type="text" id="iteraciones" value="100" placeholder="Iteraciones">
                    <input type="text" id="tolerancia" value="0.0001" placeholder="Tolerancia">
                </div>
            </div>

            <div id="form-raices">
                <label>Método</label>
                <select id="metodo">
                    <option value="Biseccion">Bisección</option>
                    <option value="ReglaFalsa">Regla Falsa</option>
                    <option value="Secante">Secante</option>
                    <option value="Tangente">Tangente</option>
                </select>
                <label>Función</label>
                <input type="text" id="funcion" placeholder="x*x - 4">
                <label>Intervalo [Xi, Xd]</label>
                <div style="display:flex; gap:5px">
                    <input type="text" id="xi" value="-5">
                    <input type="text" id="xd" value="5">
                </div>
            </div>

            <div id="form-sistemas" style="display:none;">
                <label>Método</label>
                <select id="metodoMatriz">
                    <option value="GaussJordan">Gauss-Jordan</option>
                    <option value="GaussSeidel">Gauss-Seidel</option>
                </select>
                <label>Dimensión (N)</label>
                <input type="number" id="nMatriz" value="3" min="2" max="6" onchange="crearGrillaMatriz()">
                <div id="contenedor-matriz" class="matrix-container"></div>
            </div>

            <div id="form-regresiones" style="display:none;">
                <label>Método</label>
                <select id="metodoRegresion">
                    <option value="Lineal">Lineal</option>
                    <option value="Polinomial">Polinomial</option>
                </select>
                <label>Grado</label>
                <input type="number" id="gradoPolinomio" value="1" min="1" max="6">
                <label>Punto (X, Y)</label>
                <input type="text" id="regX" placeholder="X">
                <input type="text" id="regY" placeholder="Y">
                <button type="button" onclick="agregarPunto()" style="background-color: #2a9d8f;">Agregar Punto</button>

                <select id="listaPuntos" size="5" style="width:100%; margin-top:10px;"></select>

                <button type="button" class="btn-danger" onclick="eliminarPunto()">Eliminar seleccionado</button>
                <button type="button" class="btn-danger" onclick="limpiarPuntos()" style="background-color: #6c757d;">Limpiar todo</button>
            </div>

            <div id="form-integracion" style="display:none;">
                <label>Método de Integración</label>
                <select id="metodoIntegracion" onchange="verificarIntegracionMultiple()">
                    <option value="TrapeciosSimple">Trapecios Simple</option>
                    <option value="TrapeciosMultiple">Trapecios Múltiple</option>
                    <option value="Simpson1_3Simple">Simpson 1/3 Simple</option>
                    <option value="SimpsonMultipleCombinado">Simpson 1/3 Múltiple / Combinado</option>
                    <option value="Simpson3_8">Simpson 3/8</option>
                </select>

                <label>Función f(x)</label>
                <input type="text" id="funcionInt" placeholder="1/x + x" value="1/x + x">

                <label>Límites (Xi / Xd)</label>
                <div style="display:flex; gap:5px">
                    <input type="text" id="xiInt" value="0.5" placeholder="Xi">
                    <input type="text" id="xdInt" value="3.5" placeholder="Xd">
                </div>

                <div id="contenedorNInt" style="display:none;">
                    <label>Subintervalos (N)</label>
                    <input type="number" id="nInt" value="4" min="1">
                </div>
            </div>

            <button onclick="calcular()" style="margin-top:20px; background-color: #e9c46a; color: #000;">CALCULAR</button>
        </div>

        <div class="main">
            <h1 id="tituloPrincipal">UNIDAD 1 – RAÍCES DE FUNCIONES</h1>

            <div id="card-raices" class="card">
                <h3 id="tituloMetodo">Método</h3>
                <p id="fx" style="background: #f1f3f5; padding: 10px; border-radius: 5px; font-family: monospace;">f(x)</p>
                <div class="dato"><span>Iteraciones</span><span id="it">0</span></div>
                <div class="dato"><span>Error</span><span id="error">0</span></div>
                <div class="dato"><span>Raíz</span><span id="raiz" style="color: #e63946;">0</span></div>
                <div class="dato"><span>Converge</span><span id="conv">-</span></div>
            </div>

            <div id="panel-sistemas" class="card" style="display:none;"></div>

            <div id="panel-regresiones" class="card" style="display:none;">
                <h3 id="tituloMetodoReg" style="color: #1d3557; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px;">Resultados Regresión</h3>
                <div class="dato"><span>Función obtenida</span><span id="funcRegresion" style="font-family: monospace; color: #457b9d;">-</span></div>
                <div class="dato"><span>Correlación (r)</span><span id="rRegresion">-</span></div>
                <div class="dato"><span>Efectividad</span><span id="efectividadRegresion">-</span></div>
            </div>

            <div id="card-integracion" class="card" style="display:none; background-color: #1d3557; color: white;">
                <h3 id="tituloMetodoInt" style="color: white; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 10px;">Método Integración</h3>
                <p id="fxInt" style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px; font-family: monospace;">f(x)</p>
                <div class="dato" style="border-bottom-color: rgba(255,255,255,0.1);"><span>Límite Inferior (Xi)</span><span id="resXiInt">0</span></div>
                <div class="dato" style="border-bottom-color: rgba(255,255,255,0.1);"><span>Límite Superior (Xd)</span><span id="resXdInt">0</span></div>
                <div class="dato" id="datoNInt" style="display:none; border-bottom-color: rgba(255,255,255,0.1);"><span>Subintervalos (N)</span><span id="resNInt">0</span></div>

                <div style="text-align: center; margin-top: 20px;">
                    <span style="font-size: 14px; display: block; margin-bottom: 5px; color: #a8dadc;">ÁREA CALCULADA</span>
                    <span id="areaInt" style="font-size: 32px; font-weight: bold; font-family: monospace; color: #e9c46a;">0.0000</span>
                </div>
            </div>

            <div id="grafico-raices" class="grafico">
                <div id="ggb-element"></div>
            </div>
        </div>
    </div>

    <script>
        let app;
        let solucionOriginal = null;
        let ultimaSolucion = null;
        let puntosRegresion = [];

        window.onload = () => {
            // 1. Buscamos el contenedor y medimos de qué tamaño es AHORA
            const contenedor = document.getElementById('ggb-element');
            const anchoInicial = contenedor.clientWidth || 800; // 800 es por si falla la medida
            const altoInicial = contenedor.clientHeight || 400; // 400 por si falla la medida

            app = new GGBApplet({
                appName: "graphing",
                width: anchoInicial,   /* Le damos el tamaño que acabamos de medir */
                height: altoInicial,
                showToolBar: false,
                showAlgebraInput: false,
                showMenuBar: false,

                // 2. Esta es la clave: se ejecuta SOLO cuando GeoGebra ya está listo
                appletOnLoad: function (api) {
                    ajustarTamañoGrafico(api);
                }
            }, true);

            app.inject('ggb-element');

            // Si tienes tu función crearGrillaMatriz(), llámala aquí o dentro de appletOnLoad
            // crearGrillaMatriz(); 
        };

        // 3. La función de ajuste automático
        function ajustarTamañoGrafico(api) {
            const contenedor = document.getElementById('ggb-element');
            if (!contenedor) return;

            const observer = new ResizeObserver(entries => {
                for (let entry of entries) {
                    let width = entry.contentRect.width;
                    let height = entry.contentRect.height;

                    // Solo redimensiona si el tamaño es mayor a 0 (para evitar que desaparezca de nuevo)
                    if (width > 0 && height > 0) {
                        api.setSize(width, height);
                    }
                }
            });

            observer.observe(contenedor);
        }

        function agregarPunto() {
            let x = parseFloat(document.getElementById("regX").value.replace(",", "."));
            let y = parseFloat(document.getElementById("regY").value.replace(",", "."));
            if (isNaN(x) || isNaN(y)) return alert("Punto inválido");
            puntosRegresion.push([x, y]);
            actualizarListaPuntos();
            document.getElementById("regX").value = "";
            document.getElementById("regY").value = "";
            document.getElementById("regX").focus();
        }

        function actualizarListaPuntos() {
            const lista = document.getElementById("listaPuntos");
            lista.innerHTML = "";
            puntosRegresion.forEach((p, i) => {
                const op = document.createElement("option");
                op.text = `${i + 1}: (${p[0]}, ${p[1]})`;
                lista.add(op);
            });
            graficarPuntos();
        }

        function graficarPuntos() {
            let ggb = app.getAppletObject();
            if (!ggb) return;
            ggb.reset();
            puntosRegresion.forEach((p, i) => {
                ggb.evalCommand(`P${i}=(${p[0]},${p[1]})`);
            });
        }

        function eliminarPunto() {
            const lista = document.getElementById("listaPuntos");
            if (lista.selectedIndex === -1) return alert("Selecciona un punto para borrar");
            puntosRegresion.splice(lista.selectedIndex, 1);
            actualizarListaPuntos();
        }

        function limpiarPuntos() {
            puntosRegresion = [];
            actualizarListaPuntos();
        }

        function verificarIntegracionMultiple() {
            const metodo = document.getElementById("metodoIntegracion").value;
            const esMultiple = metodo.includes("Multiple") || metodo.includes("Combinado");
            document.getElementById("contenedorNInt").style.display = esMultiple ? "block" : "none";
        }

        function cambiarUnidad() {
            const unidad = document.getElementById("unidadSeleccionada").value;

            // Ocultar todo
            document.getElementById("form-raices").style.display = "none";
            document.getElementById("form-sistemas").style.display = "none";
            document.getElementById("form-regresiones").style.display = "none";
            document.getElementById("form-integracion").style.display = "none";

            document.getElementById("card-raices").style.display = "none";
            document.getElementById("panel-sistemas").style.display = "none";
            document.getElementById("panel-regresiones").style.display = "none";
            document.getElementById("card-integracion").style.display = "none";
            document.getElementById("grafico-raices").style.display = "none";
            document.getElementById("panelConfiguracion").style.display = unidad === "integracion" ? "none" : "block";

            if (app && app.getAppletObject()) app.getAppletObject().reset();

            // Mostrar según selección
            if (unidad === "raices") {
                document.getElementById("form-raices").style.display = "block";
                document.getElementById("card-raices").style.display = "block";
                document.getElementById("grafico-raices").style.display = "flex";
                document.getElementById("tituloPrincipal").innerText = "UNIDAD 1 – RAÍCES DE FUNCIONES";
            }
            else if (unidad === "sistemas") {
                document.getElementById("form-sistemas").style.display = "block";
                document.getElementById("panel-sistemas").style.display = "block";
                document.getElementById("tituloPrincipal").innerText = "UNIDAD 2 – SISTEMAS DE ECUACIONES";
            }
            else if (unidad === "regresiones") {
                document.getElementById("form-regresiones").style.display = "block";
                document.getElementById("panel-regresiones").style.display = "block";
                document.getElementById("grafico-raices").style.display = "flex";
                document.getElementById("tituloPrincipal").innerText = "UNIDAD 3 – REGRESIONES";
                graficarPuntos();
            }
            else if (unidad === "integracion") {
                document.getElementById("form-integracion").style.display = "block";
                document.getElementById("card-integracion").style.display = "block";
                document.getElementById("grafico-raices").style.display = "flex";
                document.getElementById("tituloPrincipal").innerText = "UNIDAD 4 – INTEGRACIÓN NUMÉRICA";
                verificarIntegracionMultiple();
            }
        }

        function crearGrillaMatriz() {
            const n = parseInt(document.getElementById("nMatriz").value);
            const contenedor = document.getElementById("contenedor-matriz");
            solucionOriginal = null;
            ultimaSolucion = null;
            contenedor.style.gridTemplateColumns = `repeat(${n + 1}, 1fr)`;
            contenedor.innerHTML = "";
            for (let i = 0; i < n; i++) {
                for (let j = 0; j <= n; j++) {
                    const input = document.createElement("input");
                    input.type = "text";
                    input.className = "matrix-input" + (j === n ? " col-indep" : "");
                    input.id = `m_${i}_${j}`;
                    input.value = "0";
                    contenedor.appendChild(input);
                }
            }
        }

        function calcular() {
            const unidad = document.getElementById("unidadSeleccionada").value;
            const iter = parseInt(document.getElementById("iteraciones").value) || 100;
            const tol = parseFloat(document.getElementById("tolerancia").value.replace(",", ".")) || 0.0001;
            const getNum = (id) => parseFloat(document.getElementById(id).value.replace(",", "."));

            if (unidad === "raices") {
                window.chrome.webview.postMessage({
                    tipoAccion: "RAICES",
                    funcion: document.getElementById("funcion").value,
                    xi: getNum("xi"),
                    xd: getNum("xd"),
                    iteraciones: iter,
                    tolerancia: tol,
                    metodo: document.getElementById("metodo").value
                });
            }
            else if (unidad === "sistemas") {
                const n = parseInt(document.getElementById("nMatriz").value);
                let matriz = [];
                for (let i = 0; i < n; i++) {
                    let fila = [];
                    for (let j = 0; j <= n; j++) {
                        fila.push(parseFloat(document.getElementById(`m_${i}_${j}`).value.replace(",", ".")));
                    }
                    matriz.push(fila);
                }
                window.chrome.webview.postMessage({
                    tipoAccion: "SISTEMA",
                    metodo: document.getElementById("metodoMatriz").value,
                    dimension: n,
                    iteraciones: iter,
                    tolerancia: tol,
                    matriz: matriz
                });
            }
            else if (unidad === "regresiones") {
                if (puntosRegresion.length < 2) return alert("Debe cargar al menos 2 puntos");
                window.chrome.webview.postMessage({
                    tipoAccion: "REGRESION",
                    metodo: document.getElementById("metodoRegresion").value,
                    grado: parseInt(document.getElementById("gradoPolinomio").value),
                    tolerancia: tol,
                    puntos: puntosRegresion
                });
            }
            else if (unidad === "integracion") {
                window.chrome.webview.postMessage({
                    tipoAccion: "INTEGRACION",
                    metodo: document.getElementById("metodoIntegracion").value,
                    funcion: document.getElementById("funcionInt").value,
                    xi: getNum("xiInt"),
                    xd: getNum("xdInt"),
                    n: parseInt(document.getElementById("nInt").value) || 1
                });
            }
        }

        // RESPUESTA DESDE C#
        window.chrome.webview.addEventListener('message', event => {
            const d = event.data;

            if (d.tipoAccion === "SISTEMA" || d.Soluciones) {
                // ... Código original de sistemas ...
                const sols = d.Soluciones || d.soluciones;
                let htmlSistemas = `<h3 style="color: #1d3557; margin-top: 0;">Resultados: ${d.Metodo || d.metodo}</h3>`;
                sols.forEach((val, i) => {
                    htmlSistemas += `<div class="dato"><span>X${i + 1}</span><span style="font-family: monospace;">${val.toFixed(6)}</span></div>`;
                });
                document.getElementById("panel-sistemas").innerHTML = htmlSistemas;
            }
            else if (d.tipoAccion === "REGRESION") {
                document.getElementById("tituloMetodoReg").innerText = d.metodo;
                document.getElementById("funcRegresion").innerText = d.funcionObtenida || d.funcion;
                document.getElementById("rRegresion").innerText = (d.correlacion || d.r).toFixed(2) + "%";
                document.getElementById("efectividadRegresion").innerText = d.efectividad;

                graficarPuntos();

                let ggb = app.getAppletObject();

                if (ggb) {
                    let funcion = (d.funcionObtenida || d.funcion)
                        .replace(/,/g, ".")
                        .replace("y =", "")
                        .replace("y=", "")
                        .trim();

                    console.log("Función enviada:", funcion);

                    ggb.evalCommand(`g(x) = ${funcion}`);
                    ggb.setColor("g", 255, 0, 0);
                    ggb.setLineThickness("g", 5);
                    ggb.evalCommand("ZoomFit()");
                }
            }
            else if (d.tipoAccion === "INTEGRACION") {
                document.getElementById("tituloMetodoInt").innerText = d.metodo;
                document.getElementById("fxInt").innerText = "f(x) = " + d.funcion;
                document.getElementById("resXiInt").innerText = d.xi;
                document.getElementById("resXdInt").innerText = d.xd;
                document.getElementById("areaInt").innerText = isNaN(d.area) ? "Error" : d.area.toFixed(6);

                const esMultiple = d.metodo.includes("Multiple") || d.metodo.includes("Combinado");
                document.getElementById("datoNInt").style.display = esMultiple ? "flex" : "none";
                document.getElementById("resNInt").innerText = d.n;

                let ggb = app.getAppletObject();
                if (ggb) {
                    ggb.reset();
                    let fx = d.funcion.replace(/,/g, ".");
                    ggb.evalCommand(`f(x) = ${fx}`);
                    ggb.evalCommand(`A = Integral(f, ${d.xi}, ${d.xd})`);
                }
            }
            else {
                document.getElementById("tituloMetodo").innerText = d.Metodo || d.metodo;
                document.getElementById("it").innerText = d.Iteraciones || d.iteraciones;
                document.getElementById("error").innerText = (d.Error || d.error).toFixed(8);
                document.getElementById("conv").innerText = (d.Converge || d.converge) ? "Sí" : "No";
                document.getElementById("fx").innerText = "f(x) = " + d.funcion;
                document.getElementById("raiz").innerText = d.raiz;

                let ggb = app.getAppletObject();
                if (ggb) {
                    ggb.reset();
                    let fx = d.funcion.replace(/,/g, ".");
                    ggb.evalCommand(`f(x) = ${fx}`);
                    if (d.raiz !== null && !isNaN(d.raiz)) ggb.evalCommand(`A = (${d.raiz}, 0)`);
                    ggb.evalCommand(`B = (${d.xi}, 0)`);
                    ggb.evalCommand(`C = (${d.xd}, 0)`);
                    ggb.evalCommand(`Segment(B, C)`);
                }
            }
        });
    </script>
</body>
</html>
